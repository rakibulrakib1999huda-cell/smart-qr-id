<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Safety Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .avatar-shadow { box-shadow: 0 8px 20px rgba(225, 29, 72, 0.2); }
    </style>
</head>
<body>

    <div class="bg-red-600 text-white py-6 px-4 text-center">
        <div class="flex items-center justify-center gap-2 mb-1">
            <i data-lucide="alert-triangle" class="w-6 h-6"></i>
            <span class="text-xs font-bold uppercase tracking-widest">Emergency Safety Profile</span>
        </div>
        <p class="text-red-100 text-[10px] opacity-90 italic">Scan for emergency contact info</p>
    </div>

    <div id="loading" class="text-center py-20 text-gray-400 font-medium tracking-widest uppercase text-xs">Connecting to Database...</div>

    <div id="main-content" class="max-w-md mx-auto px-4 -mt-6 hidden">
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
            <div class="bg-gradient-to-br from-red-50 to-red-100 pt-10 pb-6 px-6 text-center">
                <div id="photo-box" class="w-28 h-28 mx-auto rounded-full bg-red-600 text-white flex items-center justify-center text-4xl font-black avatar-shadow mb-4 overflow-hidden border-4 border-white">
                    <span id="user-initials">AA</span>
                </div>
                <h1 id="user-name" class="text-2xl font-black text-gray-900 tracking-tight">---</h1>
                <p id="user-id" class="text-[10px] text-gray-400 mt-1 font-mono font-bold uppercase"></p>
            </div>

            <div class="mx-6 mt-4">
                <div class="bg-red-600 rounded-2xl p-5 text-center text-white shadow-lg">
                    <div class="flex items-center justify-center gap-2 mb-1 opacity-80">
                        <i data-lucide="droplets" class="w-4 h-4"></i>
                        <span class="text-[10px] font-bold uppercase tracking-wider">Blood Group</span>
                    </div>
                    <p id="user-blood" class="text-5xl font-black">---</p>
                </div>
            </div>

            <div id="medical-info" class="mx-6 mt-5 space-y-4"></div>

            <div class="mx-6 mt-6 px-1 flex gap-3 items-start">
                <i data-lucide="map-pin" class="w-5 h-5 text-gray-400 shrink-0"></i>
                <div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Home Address</p>
                    <p id="user-address" class="text-sm text-gray-800 font-medium"></p>
                </div>
            </div>

            <div class="p-6">
                <a id="call-primary" href="#" class="flex items-center justify-between bg-green-600 hover:bg-green-700 text-white rounded-2xl px-5 py-4 transition-all">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-green-500 rounded-full flex items-center justify-center shadow-inner">
                            <i data-lucide="phone" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <p class="text-[10px] text-green-100 font-bold uppercase opacity-80">Emergency Contact</p>
                            <p id="user-phone" class="text-lg font-bold">---</p>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <script>
        // --- আপনার নতুন অ্যাপস স্ক্রিপ্ট লিঙ্ক এখানে সেট করা হয়েছে ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxXXbOY7_hxYv1DOPUS5dY2rRYG4q3U-U7xHpJY9TedbcXbunfWWahK45n2yE2i55GZ/exec";
        const PROFILE_ID = new URLSearchParams(window.location.search).get('id') || "WATCH-001";

        async function loadProfile() {
            try {
                // Fetching data with a cache-buster
                const response = await fetch(`${SCRIPT_URL}?id=${PROFILE_ID}&_t=${Date.now()}`);
                const result = await response.json();
                
                if (result.success) {
                    const data = result.data;
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('main-content').classList.remove('hidden');

                    document.getElementById('user-name').innerText = data.Name;
                    document.getElementById('user-id').innerText = data.ID;
                    document.getElementById('user-blood').innerText = data.Blood_Group;
                    document.getElementById('user-address').innerText = data.Address;
                    document.getElementById('user-phone').innerText = data.Phone1;
                    document.getElementById('call-primary').href = `tel:${data.Phone1}`;

                    const init = data.Name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
                    document.getElementById('user-initials').innerText = init;

                    if (data.Photo && data.Photo.length > 5) {
                        document.getElementById('photo-box').innerHTML = `<img src="${data.Photo}" class="w-full h-full object-cover">`;
                    }

                    const medInfo = document.getElementById('medical-info');
                    if (data.Medicine_Details) {
                        medInfo.innerHTML = `
                            <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4 flex gap-3">
                                <i data-lucide="pill" class="w-5 h-5 text-amber-600 shrink-0"></i>
                                <div>
                                    <p class="text-[10px] font-bold text-amber-800 uppercase tracking-widest">Medical Notes</p>
                                    <p class="text-sm text-amber-900 font-medium">${data.Medicine_Details}</p>
                                </div>
                            </div>`;
                    }
                    
                    lucide.createIcons();
                } else {
                    document.getElementById('loading').innerText = "❌ Profile Not Found (" + PROFILE_ID + ")";
                }
            } catch (err) {
                document.getElementById('loading').innerText = "⚠️ Connection Error. Check your Internet or Apps Script permissions.";
            }
        }

        loadProfile();
    </script>
</body>
</html>
