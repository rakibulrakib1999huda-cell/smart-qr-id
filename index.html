<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Watch Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .info-tile { background: #f1f5f9; border-radius: 1.25rem; padding: 1rem; display: flex; gap: 0.75rem; align-items: center; }
        .loader-spin { border-top-color: currentColor; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen pb-10">

    <div id="top-bar" class="bg-red-600 text-white py-4 px-6 flex justify-between items-center sticky top-0 z-50 shadow-md">
        <div class="flex items-center gap-2">
            <i data-lucide="shield-check" class="w-5 h-5"></i>
            <span id="brand-name" class="text-[10px] font-black uppercase tracking-widest text-white">Safety Watch Pro</span>
        </div>
        <button onclick="openModal('pin-modal')" class="p-2 hover:bg-black/10 rounded-full"><i data-lucide="settings" class="w-5 h-5"></i></button>
    </div>

    <div id="main-loader" class="flex flex-col items-center justify-center h-[80vh]">
        <div class="w-12 h-12 border-4 border-gray-200 loader-spin rounded-full text-red-600"></div>
    </div>

    <div id="profile-container" class="max-w-md mx-auto px-5 pt-8 hidden">
        <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-gray-100">
            <div id="hero-bg" class="bg-gradient-to-b from-red-50 to-white pt-12 pb-6 text-center">
                <div id="photo-display" class="w-32 h-32 mx-auto rounded-full bg-red-600 text-white flex items-center justify-center text-4xl font-black shadow-xl mb-4 overflow-hidden border-4 border-white"></div>
                <h1 id="view-name" class="text-2xl font-extrabold text-gray-900 tracking-tight">---</h1>
                <p id="view-id" class="text-[10px] text-gray-400 font-mono font-bold uppercase tracking-widest"></p>
                <p id="view-title" class="text-sm font-bold text-blue-600 mt-1 uppercase hidden"></p>
            </div>
            <div class="px-6 mb-6">
                <div id="feature-card" class="bg-red-600 rounded-3xl p-5 text-white text-center shadow-lg transition-colors">
                    <span id="feature-label" class="text-[10px] font-bold uppercase opacity-80 block mb-1">Blood Group</span>
                    <p id="feature-value" class="text-4xl font-black tracking-tighter">---</p>
                </div>
            </div>
            <div id="info-list" class="px-6 space-y-3"></div>
            <div class="px-6 mt-6 pb-8"><a id="view-call" href="#" class="flex items-center justify-between bg-green-600 p-5 rounded-2xl text-white shadow-lg"><div class="flex items-center gap-4"><div class="bg-white/20 p-2 rounded-full"><i data-lucide="phone" class="w-5 h-5"></i></div><div><p class="text-[9px] font-bold uppercase opacity-70">Primary Contact</p><p id="view-phone" class="text-lg font-black"></p></div></div><i data-lucide="external-link" class="w-5 h-5 opacity-40"></i></a></div>
        </div>
    </div>

    <div id="pin-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-6">
        <div class="bg-white rounded-[2rem] p-8 max-w-xs w-full shadow-2xl text-center">
            <h3 class="text-xl font-black mb-1">Admin Access</h3>
            <p class="text-gray-400 text-[10px] font-bold uppercase mb-8">Enter Security PIN</p>
            <input type="password" id="pin-input" class="w-full text-center text-3xl font-black border-b-4 border-gray-200 focus:border-red-600 focus:outline-none mb-8" maxlength="4" placeholder="••••">
            <div class="flex gap-4">
                <button onclick="closeModal('pin-modal')" class="flex-1 py-4 text-gray-400 font-bold uppercase text-[10px]">Cancel</button>
                <button id="verify-btn" onclick="checkPin()" class="flex-1 py-4 bg-red-600 text-white rounded-2xl font-bold uppercase text-[10px]">Verify</button>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="fixed inset-0 bg-white z-[200] hidden overflow-y-auto p-6">
        <div class="max-w-md mx-auto pb-10">
            <div class="flex justify-between items-center mb-8 sticky top-0 bg-white py-2 z-10">
                <h2 class="text-2xl font-black tracking-tight">Update Information</h2>
                <button onclick="closeModal('edit-modal')" class="p-2 bg-gray-100 rounded-full"><i data-lucide="x"></i></button>
            </div>
            <div id="edit-form-fields" class="space-y-5"></div>
            
            <div class="mt-10 pt-8 border-t-2 border-dashed border-gray-100">
                <label class="text-[10px] font-black uppercase text-red-500 block mb-2 tracking-widest">Update Security PIN (4 Digits)</label>
                <input id="inp-new-pin" type="password" maxlength="4" placeholder="Enter New PIN" class="w-full p-4 bg-red-50 rounded-2xl border border-red-100 focus:ring-2 focus:ring-red-500 outline-none font-bold text-center text-xl">
            </div>

            <button onclick="saveData()" id="save-btn" class="w-full mt-8 py-5 bg-red-600 text-white rounded-3xl font-black uppercase tracking-widest shadow-xl">Save Changes</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxPgwmeFCy17lLlFuK2c5FDy1sn3toChZTB9ltm5WWTw591apt6bKdLzwh7PrDBjETo/exec";
        const PROFILE_ID = new URLSearchParams(window.location.search).get('id') || "WATCH-001";
        const isCard = PROFILE_ID.toUpperCase().startsWith('CARD');
        let userData = {};

        async function init() {
            try {
                const res = await fetch(`${SCRIPT_URL}?id=${PROFILE_ID}`);
                const result = await res.json();
                if (result.success) { userData = result.data; renderView(); }
            } catch (e) { console.error(e); }
        }

        function renderView() {
            if (isCard) {
                document.getElementById('top-bar').classList.replace('bg-red-600', 'bg-blue-700');
                document.getElementById('feature-card').classList.replace('bg-red-600', 'bg-blue-600');
                document.getElementById('verify-btn').classList.replace('bg-red-600', 'bg-blue-600');
                document.getElementById('save-btn').classList.replace('bg-red-600', 'bg-blue-600');
                document.getElementById('photo-display').classList.replace('bg-red-600', 'bg-blue-600');
            }
            document.getElementById('view-name').innerText = userData.Name;
            document.getElementById('view-id').innerText = userData.ID;
            let listHtml = "";
            const tiles = isCard ? [{icon: 'mail', label: 'Email', val: userData.Email},{icon: 'globe', label: 'Website', val: userData.Website, link: true},{icon: 'share-2', label: 'Social', val: userData.Social_Links, link: true}] 
                                : [{icon: 'map-pin', label: 'Address', val: userData.Address},{icon: 'pill', label: 'Medicine', val: userData.Medicine_Details}];
            tiles.forEach(t => { if(t.val && t.val !== "null" && t.val !== "") listHtml += `<div class="info-tile"><i data-lucide="${t.icon}" class="w-5 h-5 text-gray-400"></i><div><p class="text-[9px] font-bold text-gray-400 uppercase">${t.label}</p>${t.link ? `<a href="${t.val}" target="_blank" class="text-sm font-bold text-blue-600 truncate block">${t.val}</a>` : `<p class="text-sm font-bold text-gray-700">${t.val}</p>`}</div></div>`; });
            document.getElementById('info-list').innerHTML = listHtml;
            document.getElementById('feature-label').innerText = isCard ? "Company" : "Blood Group";
            document.getElementById('feature-value').innerText = isCard ? (userData.Company || "Personal") : (userData.Blood_Group || "---");
            document.getElementById('view-phone').innerText = isCard ? userData.Mobile : userData.Phone1;
            document.getElementById('view-call').href = `tel:${isCard ? userData.Mobile : userData.Phone1}`;
            const photo = isCard ? userData.Logo : userData.Photo;
            document.getElementById('photo-display').innerHTML = photo && photo.length > 10 ? `<img src="${photo}" class="w-full h-full object-cover">` : (userData.Name || "ID").substring(0,2);
            document.getElementById('main-loader').classList.add('hidden');
            document.getElementById('profile-container').classList.remove('hidden');
            lucide.createIcons();
        }

        function checkPin() {
            const correctPin = userData.Admin_PIN || "1234";
            if(document.getElementById('pin-input').value == correctPin) {
                setupEditForm();
                document.getElementById('inp-new-pin').value = correctPin; // Default PIN show korbe change korar jonno
                closeModal('pin-modal');
                openModal('edit-modal');
            } else { alert("Wrong PIN!"); }
            document.getElementById('pin-input').value = "";
        }

        function setupEditForm() {
            const fields = isCard ? [{id: 'name', label: 'Full Name', val: userData.Name},{id: 'title', label: 'Job Title', val: userData.Title},{id: 'company', label: 'Company Name', val: userData.Company},{id: 'phone', label: 'Mobile Number', val: userData.Mobile},{id: 'email', label: 'Email Address', val: userData.Email},{id: 'website', label: 'Website Link', val: userData.Website},{id: 'social', label: 'Social Media Link', val: userData.Social_Links},{id: 'photo', label: 'Logo URL', val: userData.Logo}] 
                                : [{id: 'name', label: 'Full Name', val: userData.Name},{id: 'blood', label: 'Blood Group', val: userData.Blood_Group},{id: 'phone', label: 'Emergency Contact', val: userData.Phone1},{id: 'address', label: 'Home Address', val: userData.Address},{id: 'medicine', label: 'Medical Instructions', val: userData.Medicine_Details},{id: 'photo', label: 'Photo URL', val: userData.Photo}];
            let formHtml = "";
            fields.forEach(f => { formHtml += `<div><label class="text-[10px] font-bold uppercase text-gray-400 block mb-2 tracking-widest">${f.label}</label><input id="inp-${f.id}" value="${f.val || ''}" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-${isCard?'blue':'red'}-500 outline-none font-bold text-sm"></div>`; });
            document.getElementById('edit-form-fields').innerHTML = formHtml;
        }

        async function saveData() {
            const btn = document.getElementById('save-btn');
            btn.innerText = "Saving Data..."; btn.disabled = true;
            const data = { id: PROFILE_ID, pin: document.getElementById('inp-new-pin').value }; // PIN add kora hoyeche
            if(isCard) {
                data.name = document.getElementById('inp-name').value; data.title = document.getElementById('inp-title').value; data.company = document.getElementById('inp-company').value;
                data.mobile = document.getElementById('inp-phone').value; data.email = document.getElementById('inp-email').value; data.website = document.getElementById('inp-website').value;
                data.social = document.getElementById('inp-social').value; data.logo = document.getElementById('inp-photo').value;
            } else {
                data.name = document.getElementById('inp-name').value; data.blood = document.getElementById('inp-blood').value; data.phone1 = document.getElementById('inp-phone').value;
                data.address = document.getElementById('inp-address').value; data.medicine = document.getElementById('inp-medicine').value; data.photo = document.getElementById('inp-photo').value;
            }
            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
                alert("Profile and PIN Updated!"); location.reload();
            } catch (e) { alert("Error!"); btn.innerText = "Save Changes"; btn.disabled = false; }
        }

        function openModal(id) { document.getElementById(id).style.display = (id === 'edit-modal' ? 'block' : 'flex'); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        init();
    </script>
</body>
</html>
