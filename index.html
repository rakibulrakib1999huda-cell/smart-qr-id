<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Watch Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfdfd; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .profile-gradient { background: linear-gradient(135deg, #fff5f5 0%, #ffffff 100%); }
    </style>
</head>
<body class="min-h-screen pb-10">

    <div class="bg-red-600 text-white py-3 px-4 flex justify-between items-center sticky top-0 z-50 shadow-lg">
        <div class="flex items-center gap-2">
            <i data-lucide="shield-alert" class="w-5 h-5 animate-pulse"></i>
            <span class="text-[10px] font-extrabold uppercase tracking-[0.2em]">Safety Watch Pro</span>
        </div>
        <button onclick="openPinModal()" class="hover:bg-red-700 p-2 rounded-full transition-colors">
            <i data-lucide="settings" class="w-5 h-5"></i>
        </button>
    </div>

    <div id="loader" class="flex flex-col items-center justify-center h-[80vh]">
        <div class="w-12 h-12 border-4 border-red-200 border-t-red-600 rounded-full animate-spin"></div>
        <p class="mt-4 text-gray-400 text-xs font-bold uppercase tracking-widest">Accessing Secure Data...</p>
    </div>

    <div id="profile-content" class="max-w-md mx-auto px-5 pt-8 hidden">
        <div class="relative bg-white rounded-[2.5rem] shadow-2xl shadow-red-100 overflow-hidden border border-gray-50">
            
            <div class="profile-gradient pt-12 pb-8 px-6 text-center relative">
                <div class="absolute top-4 right-6 bg-red-50 text-red-600 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter border border-red-100">
                    Active Profile
                </div>
                
                <div id="user-photo-container" class="relative w-32 h-32 mx-auto mb-6">
                    <div id="photo-display" class="w-full h-full rounded-full border-4 border-white shadow-2xl flex items-center justify-center bg-red-600 text-white text-4xl font-black overflow-hidden">
                        </div>
                </div>

                <h1 id="disp-name" class="text-3xl font-extrabold text-gray-900 tracking-tight leading-none">---</h1>
                <p id="disp-id" class="text-[11px] text-gray-400 mt-2 font-mono font-bold tracking-widest uppercase"></p>
            </div>

            <div class="grid grid-cols-1 px-6 gap-4 -mt-2">
                <div class="bg-red-600 rounded-3xl p-6 text-white shadow-xl shadow-red-200 transform transition hover:scale-[1.02]">
                    <div class="flex items-center justify-center gap-2 mb-1 opacity-70">
                        <i data-lucide="droplet" class="w-4 h-4 fill-current"></i>
                        <span class="text-[10px] font-black uppercase tracking-[0.2em]">Blood Group</span>
                    </div>
                    <p id="disp-blood" class="text-6xl font-black text-center tracking-tighter">---</p>
                </div>
            </div>

            <div class="p-6 space-y-5">
                <div class="flex gap-4 items-start p-4 rounded-2xl bg-gray-50 border border-gray-100">
                    <div class="p-2 bg-white rounded-xl shadow-sm"><i data-lucide="map-pin" class="w-5 h-5 text-gray-400"></i></div>
                    <div>
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Residence</p>
                        <p id="disp-address" class="text-sm text-gray-800 font-semibold mt-0.5"></p>
                    </div>
                </div>

                <div id="medical-card" class="hidden flex gap-4 items-start p-4 rounded-2xl bg-amber-50 border border-amber-100">
                    <div class="p-2 bg-white rounded-xl shadow-sm"><i data-lucide="pill" class="w-5 h-5 text-amber-500"></i></div>
                    <div>
                        <p class="text-[10px] font-bold text-amber-600 uppercase tracking-widest">Medical Instructions</p>
                        <p id="disp-medicine" class="text-sm text-amber-900 font-semibold mt-0.5"></p>
                    </div>
                </div>

                <a id="call-link" href="#" class="flex items-center justify-between bg-green-600 hover:bg-green-700 text-white rounded-[1.5rem] px-6 py-5 shadow-lg shadow-green-100 active:scale-95 transition-all mt-4">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center"><i data-lucide="phone" class="w-6 h-6"></i></div>
                        <div>
                            <p class="text-[10px] font-bold uppercase opacity-70">Emergency Contact</p>
                            <p id="disp-phone" class="text-xl font-extrabold tracking-tight"></p>
                        </div>
                    </div>
                    <i data-lucide="arrow-right" class="w-6 h-6 opacity-40"></i>
                </a>
            </div>
        </div>
    </div>

    <div id="pin-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-6">
        <div class="bg-white rounded-[2rem] p-8 max-w-xs w-full shadow-2xl">
            <h3 class="text-xl font-black text-center mb-4">Admin Access</h3>
            <p class="text-gray-400 text-xs text-center mb-6">Enter PIN to edit this profile</p>
            <input type="password" id="pin-input" class="w-full text-center text-2xl tracking-[1em] font-bold border-b-2 border-red-600 focus:outline-none mb-6" maxlength="4">
            <div class="flex gap-3">
                <button onclick="closePinModal()" class="flex-1 py-3 text-gray-400 font-bold uppercase text-xs">Cancel</button>
                <button onclick="verifyPin()" class="flex-1 py-3 bg-red-600 text-white rounded-xl font-bold uppercase text-xs">Verify</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxPgwmeFCy17lLlFuK2c5FDy1sn3toChZTB9ltm5WWTw591apt6bKdLzwh7PrDBjETo/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const PROFILE_ID = urlParams.get('id') || "WATCH-001";

        async function init() {
            try {
                const response = await fetch(`${SCRIPT_URL}?id=${PROFILE_ID}`);
                const res = await response.json();
                
                if (res.success) {
                    const d = res.data;
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('profile-content').classList.remove('hidden');

                    document.getElementById('disp-name').innerText = d.Name;
                    document.getElementById('disp-id').innerText = d.ID;
                    document.getElementById('disp-blood').innerText = d.Blood_Group;
                    document.getElementById('disp-address').innerText = d.Address;
                    document.getElementById('disp-phone').innerText = d.Phone1;
                    document.getElementById('call-link').href = `tel:${d.Phone1}`;

                    if (d.Medicine_Details) {
                        document.getElementById('medical-card').classList.remove('hidden');
                        document.getElementById('disp-medicine').innerText = d.Medicine_Details;
                    }

                    const photoBox = document.getElementById('photo-display');
                    if (d.Photo && d.Photo.length > 5) {
                        photoBox.innerHTML = `<img src="${d.Photo}" class="w-full h-full object-cover">`;
                    } else {
                        photoBox.innerText = d.Name.substring(0,2).toUpperCase();
                    }
                    
                    lucide.createIcons();
                }
            } catch (e) { console.error(e); }
        }

        function openPinModal() { document.getElementById('pin-modal').style.display = 'flex'; }
        function closePinModal() { document.getElementById('pin-modal').style.display = 'none'; }
        
        function verifyPin() {
            const pin = document.getElementById('pin-input').value;
            if(pin === "1234") { // আপনি চাইলে আপনার পিন পরিবর্তন করতে পারেন
                window.open("https://docs.google.com/spreadsheets/d/1NhaJ_1EVbOWcsELx8JF85-IMceTKbAMPor39RIRJcww/edit", "_blank");
                closePinModal();
            } else {
                alert("Wrong PIN!");
            }
        }

        init();
    </script>
</body>
</html>
