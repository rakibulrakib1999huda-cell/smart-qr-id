<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Pro - Digital ID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfdfd; }
        
        .card-bg-full {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        .text-overlay {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            padding: 40px 30px 20px;
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            z-index: 5;
        }

        .profile-card { background: white; border-radius: 2rem; overflow: hidden; box-shadow: 0 10px 40px -10px rgba(0,0,0,0.1); }
        .info-tile { background: #f7faff; border-radius: 1rem; padding: 1rem; display: flex; gap: 0.75rem; align-items: center; border: 1px solid #f0f3f6; }
        .loader-spin { border-top-color: currentColor; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen pb-10">

    <div id="top-bar" class="bg-red-600 text-white py-4 px-6 flex justify-between items-center sticky top-0 z-50 shadow-md">
        <div class="flex items-center gap-2">
            <i data-lucide="shield-check" class="w-5 h-5"></i>
            <span id="brand-name" class="text-[10px] font-black uppercase tracking-widest">Safety Watch Pro</span>
        </div>
        <button onclick="openModal('pin-modal')" class="p-2 hover:bg-black/10 rounded-full"><i data-lucide="settings" class="w-5 h-5"></i></button>
    </div>

    <div id="main-loader" class="flex flex-col items-center justify-center h-[80vh]">
        <div class="w-12 h-12 border-4 border-gray-200 loader-spin rounded-full text-red-600"></div>
    </div>

    <div id="profile-container" class="max-w-md mx-auto px-5 pt-8 hidden">
        <div class="profile-card relative border border-gray-100 shadow-2xl pb-8">
            
            <div id="hero-bg" class="relative bg-gray-200 min-h-[450px]">
                <div id="human-full-pic" class="card-bg-full"></div>
                
                <div id="logo-container" class="absolute top-5 left-6 z-20 hidden">
                    <div id="photo-display-logo" class="w-14 h-14 rounded-full flex items-center justify-center shadow-lg overflow-hidden border-2 border-white bg-white"></div>
                </div>

                <div class="absolute top-5 right-6 z-20">
                    <div id="feature-card" class="bg-red-600 rounded-xl px-3 py-1.5 text-white shadow-xl">
                        <span id="feature-label" class="text-[9px] font-bold uppercase block">Status</span>
                        <p id="feature-value" class="text-xs font-bold truncate">---</p>
                    </div>
                </div>

                <div class="text-overlay">
                    <h1 id="view-name" class="text-3xl font-extrabold text-white leading-tight">---</h1>
                    <div class="flex items-center gap-3 mt-1">
                        <p id="view-id" class="text-[10px] text-gray-300 font-mono font-bold tracking-widest uppercase"></p>
                        <p id="view-title" class="text-xs font-bold text-blue-400 uppercase hidden"></p>
                    </div>
                </div>
            </div>

            <div id="info-list" class="px-6 mt-6 space-y-3"></div>

            <div class="px-6 mt-6">
                <a id="view-call" href="#" class="flex items-center justify-between bg-green-600 p-5 rounded-2xl text-white shadow-lg active:scale-95 transition-all">
                    <div class="flex items-center gap-4">
                        <div class="bg-white/20 p-2 rounded-full"><i data-lucide="phone" class="w-5 h-5"></i></div>
                        <div>
                            <p id="phone-label" class="text-[10px] font-bold uppercase opacity-70">Contact</p>
                            <p id="view-phone" class="text-lg font-black"></p>
                        </div>
                    </div>
                    <i data-lucide="external-link" class="w-5 h-5 opacity-40"></i>
                </a>
            </div>
        </div>
    </div>

    <div id="pin-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-6">
        <div class="bg-white rounded-[2rem] p-8 max-w-xs w-full shadow-2xl text-center">
            <h3 class="text-xl font-black mb-1">Admin Access</h3>
            <p class="text-gray-400 text-[10px] font-bold uppercase mb-8">Enter Security PIN</p>
            <input type="password" id="pin-input" class="w-full text-center text-3xl font-black border-b-4 border-gray-200 focus:border-red-600 focus:outline-none mb-8" maxlength="4" placeholder="••••">
            <div class="flex gap-4">
                <button onclick="closeModal('pin-modal')" class="flex-1 py-4 text-gray-400 font-bold uppercase text-[10px]">Cancel</button>
                <button onclick="checkPin()" id="verify-btn" class="flex-1 py-4 bg-red-600 text-white rounded-2xl font-bold uppercase text-[10px]">Verify</button>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="fixed inset-0 bg-white z-[200] hidden overflow-y-auto p-6">
        <div class="max-w-md mx-auto pb-10">
            <div class="flex justify-between items-center mb-8 sticky top-0 bg-white py-2 z-10 border-b">
                <h2 class="text-2xl font-black tracking-tight">Update Data</h2>
                <button onclick="closeModal('edit-modal')" class="p-2 bg-gray-100 rounded-full"><i data-lucide="x"></i></button>
            </div>
            <div id="edit-form-fields" class="space-y-5"></div>
            <div class="mt-8 pt-6 border-t">
                <label class="text-[10px] font-bold uppercase text-gray-400 block mb-2">Change Admin PIN</label>
                <input id="inp-new-pin" type="password" maxlength="4" class="w-full p-4 bg-gray-50 rounded-2xl border font-bold text-center text-xl">
            </div>
            <button onclick="saveData()" id="save-btn" class="w-full mt-8 py-5 bg-red-600 text-white rounded-3xl font-black uppercase tracking-widest shadow-xl">Save Changes</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx3gpXJaWbyM9wyoGUqlvuVa95q09svL01no57jKRG5q4QcsXn80ZWR8wnK0Xz7Askc/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const PROFILE_ID = urlParams.get('id') || "WATCH-001";
        const isCard = PROFILE_ID.toUpperCase().startsWith('CARD');
        let userData = {};

        async function init() {
            try {
                const res = await fetch(`${SCRIPT_URL}?id=${PROFILE_ID}`);
                const result = await res.json();
                if (result.success) { userData = result.data; renderView(); }
                else { document.getElementById('main-loader').innerHTML = "ID Not Found"; }
            } catch (e) { console.error(e); }
        }

        function renderView() {
            if (isCard) {
                document.getElementById('top-bar').classList.replace('bg-red-600', 'bg-blue-700');
                document.getElementById('brand-name').innerText = "Safety Card Pro";
                document.getElementById('feature-card').classList.replace('bg-red-600', 'bg-blue-600');
                document.getElementById('verify-btn').classList.replace('bg-red-600', 'bg-blue-600');
                document.getElementById('save-btn').classList.replace('bg-red-600', 'bg-blue-600');
            }

            document.getElementById('view-name').innerText = userData.Name;
            document.getElementById('view-id').innerText = userData.ID;

            let listHtml = "";
            const tiles = isCard ? [
                {icon: 'mail', label: 'Email', val: userData.Email},
                {icon: 'globe', label: 'Website', val: userData.Website, link: true},
                {icon: 'share-2', label: 'Social', val: userData.Social_Links, link: true}
            ] : [
                {icon: 'map-pin', label: 'Address', val: userData.Address},
                {icon: 'pill', label: 'Medicine', val: userData.Medicine_Details}
            ];
            tiles.forEach(t => { if(t.val && t.val !== "" && t.val !== "null") listHtml += `<div class="info-tile"><i data-lucide="${t.icon}" class="w-5 h-5 text-gray-400"></i><div><p class="text-[9px] font-bold text-gray-400 uppercase">${t.label}</p>${t.link ? `<a href="${t.val}" target="_blank" class="text-sm font-bold text-blue-600 truncate block">${t.val}</a>` : `<p class="text-sm font-bold text-gray-700">${t.val}</p>`}</div></div>`; });
            document.getElementById('info-list').innerHTML = listHtml;
            
            document.getElementById('feature-label').innerText = isCard ? "Company" : "Blood Group";
            document.getElementById('feature-value').innerText = isCard ? (userData.Company || "Personal") : (userData.Blood_Group || "---");
            document.getElementById('view-phone').innerText = isCard ? userData.Mobile : userData.Phone1;
            document.getElementById('view-call').href = `tel:${isCard ? userData.Mobile : userData.Phone1}`;
            document.getElementById('phone-label').innerText = isCard ? "Primary Mobile" : "Emergency Contact";

            // Photo Logic
            if(isCard) {
                if(userData.Photo) document.getElementById('human-full-pic').style.backgroundImage = `url('${userData.Photo}')`;
                if(userData.Logo) {
                    document.getElementById('logo-container').classList.remove('hidden');
                    document.getElementById('photo-display-logo').innerHTML = `<img src="${userData.Logo}" class="w-full h-full object-cover">`;
                }
                document.getElementById('view-title').innerText = userData.Title || "";
                document.getElementById('view-title').classList.remove('hidden');
            } else {
                if(userData.Photo) document.getElementById('human-full-pic').style.backgroundImage = `url('${userData.Photo}')`;
                document.getElementById('logo-container').classList.add('hidden');
            }

            document.getElementById('main-loader').classList.add('hidden');
            document.getElementById('profile-container').classList.remove('hidden');
            lucide.createIcons();
        }

        function checkPin() {
            const correctPin = userData.Admin_PIN || "1234";
            if(document.getElementById('pin-input').value == correctPin) {
                setupEditForm();
                document.getElementById('inp-new-pin').value = userData.Admin_PIN || "1234";
                closeModal('pin-modal');
                openModal('edit-modal');
            } else { alert("Wrong PIN!"); }
        }

        function setupEditForm() {
            const fields = isCard ? [
                {id: 'name', label: 'Full Name', val: userData.Name},
                {id: 'title', label: 'Job Title', val: userData.Title},
                {id: 'company', label: 'Company Name', val: userData.Company},
                {id: 'mobile', label: 'Mobile Number', val: userData.Mobile},
                {id: 'email', label: 'Email Address', val: userData.Email},
                {id: 'website', label: 'Website Link', val: userData.Website},
                {id: 'social', label: 'Social Links', val: userData.Social_Links},
                {id: 'logo', label: 'Company Logo URL', val: userData.Logo},
                {id: 'photo', label: 'Profile Photo URL', val: userData.Photo}
            ] : [
                {id: 'name', label: 'Full Name', val: userData.Name},
                {id: 'blood', label: 'Blood Group', val: userData.Blood_Group},
                {id: 'phone1', label: 'Emergency Contact', val: userData.Phone1},
                {id: 'address', label: 'Address', val: userData.Address},
                {id: 'medicine', label: 'Medicine Details', val: userData.Medicine_Details},
                {id: 'photo', label: 'Background Photo URL', val: userData.Photo}
            ];

            let html = "";
            fields.forEach(f => {
                html += `<div><label class="text-[10px] font-bold text-gray-400 uppercase block mb-1">${f.label}</label>
                <input id="inp-${f.id}" value="${f.val || ''}" class="w-full p-4 bg-gray-50 rounded-2xl border font-bold text-sm"></div>`;
            });
            document.getElementById('edit-form-fields').innerHTML = html;
        }

        async function saveData() {
            const btn = document.getElementById('save-btn');
            btn.innerText = "Saving..."; btn.disabled = true;

            const data = { id: PROFILE_ID, pin: document.getElementById('inp-new-pin').value };
            if(isCard) {
                data.name = document.getElementById('inp-name').value;
                data.title = document.getElementById('inp-title').value;
                data.company = document.getElementById('inp-company').value;
                data.mobile = document.getElementById('inp-mobile').value;
                data.email = document.getElementById('inp-email').value;
                data.website = document.getElementById('inp-website').value;
                data.social = document.getElementById('inp-social').value;
                data.logo = document.getElementById('inp-logo').value;
                data.photo = document.getElementById('inp-photo').value;
            } else {
                data.name = document.getElementById('inp-name').value;
                data.blood = document.getElementById('inp-blood').value;
                data.phone1 = document.getElementById('inp-phone1').value;
                data.address = document.getElementById('inp-address').value;
                data.medicine = document.getElementById('inp-medicine').value;
                data.photo = document.getElementById('inp-photo').value;
            }

            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
                alert("Success!"); location.reload();
            } catch (e) { alert("Error!"); btn.innerText = "Save Changes"; btn.disabled = false; }
        }

        function openModal(id) { document.getElementById(id).style.display = (id === 'edit-modal' ? 'block' : 'flex'); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        init();
    </script>
</body>
</html>
